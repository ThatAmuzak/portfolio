<!-- Vim-style command bar easter egg: press : to activate -->
<div id="vim-command-overlay" class="hidden font-mono" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:40;width:calc(100% - 1rem);max-width:56rem">
    <!-- Suggestions row (vim wildmenu style) -->
    <div id="vim-command-suggestions" class="hidden flex flex-wrap items-center px-4 py-1.5 bg-gray-800 border-t border-gray-600 min-h-[2rem]"></div>
    <!-- Command line -->
    <div class="flex items-center bg-gray-900 text-green-400 px-4 py-2 border-t border-gray-700">
      <span class="text-blue-400 mr-1">:</span>
      <span id="vim-command-input" class="text-green-400"></span>
      <span class="blinking-cursor">█</span>
    </div>
</div>
